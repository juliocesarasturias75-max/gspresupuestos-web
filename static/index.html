<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSPresupuestos Web</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; }
        header { background: #1e40af; color: white; padding: 6px 20px; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; min-height: 48px; }
        .header-brand { display: flex; align-items: center; }
        .header-logo { height: 36px; width: auto; filter: brightness(0) invert(1); }
        .header-text { text-align: right; line-height: 1.25; }
        .header-title { font-size: 0.82rem; font-weight: 700; }
        .header-version { font-size: 0.65rem; color: #bfdbfe; }
        .container { display: flex; gap: 14px; padding: 14px; max-width: 1400px; margin: 0 auto; }
        .panel { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; }
        .left { width: 320px; flex-shrink: 0; }
        .right { flex: 1; min-width: 0; }
        h2 { color: #1e40af; font-size: 0.95rem; margin: 0 0 12px; border-bottom: 2px solid #dbeafe; padding-bottom: 6px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin: 8px 0 3px; }
        input, textarea { width: 100%; padding: 7px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.85rem; }
        .row2 { display: flex; gap: 8px; }
        .row2 > div { flex: 1; }
        .btn { display: inline-block; padding: 8px 14px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; font-size: 0.85rem; margin: 4px 4px 4px 0; }
        .btn-primary { background: #1e40af; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-file { background: #e0f2fe; color: #1e40af; }
        .status { font-size: 0.78rem; margin-top: 4px; }
        .ok { color: #10b981; }
        .err { color: #dc2626; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background: #1e40af; color: white; padding: 8px 6px; text-align: left; }
        td { padding: 7px 6px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        tr:hover { background: #f8fafc; }
        .totales { background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; padding: 14px 16px; margin-top: 14px; }
        .totales-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; margin-bottom: 8px; }
        .totales-row:last-child { margin-bottom: 0; }
        .totales-item { font-size: 0.85rem; white-space: nowrap; }
        .totales-item strong { color: #1e40af; }
        .totales-item.final strong { font-size: 0.95rem; }
        .totales-item.final span { font-size: 1rem; font-weight: 700; color: #1e40af; }
        .totales-item.secondary strong { color: #6b7280; }
        .totales-item.secondary span { color: #6b7280; }
        .totales-item.beneficio strong, .totales-item.beneficio span { color: #059669; }
        .totales-item.margen strong, .totales-item.margen span { color: #3b82f6; }
        .totales-sep { color: #9ca3af; font-size: 1.1rem; }
        .botones-pdf { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
        .btn-resumen { background: #3b82f6; color: white; }
        .btn-add { background: #8b5cf6; color: white; }
        .btn-del { background: #ef4444; color: white; }
        .btn-edit { background: #0ea5e9; color: white; }
        .tabla-toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .inp-celda { width: 62px; padding: 4px; font-size: 0.78rem; border: 1px solid #cbd5e1; border-radius: 3px; text-align: right; }
        .inp-celda-sm { width: 48px; text-align: center; }
        .nota-icon { color: #f59e0b; font-size: 0.75rem; margin-left: 4px; }
        .modal-desc { font-size: 0.82rem; color: #6b7280; background: #f8fafc; padding: 8px; border-radius: 4px; margin-bottom: 12px; max-height: 80px; overflow-y: auto; }
        tr.tabla-row { cursor: pointer; }
        tr.tabla-row.selected { background: #dbeafe !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 10px; padding: 24px; width: 90%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
        .modal h3 { margin: 0 0 16px; color: #1e40af; }
        .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
        .hidden { display: none; }
        @media (max-width: 900px) { .container { flex-direction: column; } .left { width: 100%; } }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-brand">
                <img src="/static/logo_secopvc.gif" alt="SECO PVC" class="header-logo"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="header-logo-fallback" style="display:none; font-size:1rem; font-weight:800;">SECOPVC</div>
            </div>
            <div class="header-text">
                <div class="header-title">Generador de Presupuestos</div>
                <div class="header-version">Versión 2.0</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="panel left">
            <h2>1. Archivos</h2>
            <input type="file" id="fileTxt" accept=".txt" class="hidden">
            <button class="btn btn-file" onclick="document.getElementById('fileTxt').click()">Subir TXT</button>
            <div id="statusTxt" class="status">Esperando TXT...</div>

            <input type="file" id="filePdf" accept=".pdf" class="hidden">
            <button class="btn btn-file" onclick="document.getElementById('filePdf').click()">Subir PDF (dibujos)</button>
            <div id="statusPdf" class="status">Opcional</div>

            <input type="file" id="fileCond" accept=".txt" class="hidden">
            <button class="btn btn-file" onclick="document.getElementById('fileCond').click()">Subir Condiciones</button>
            <div id="statusCond" class="status">Opcional</div>

            <h2 style="margin-top:16px">2. Cliente</h2>
            <label>Nº Oferta</label>
            <input type="text" id="numOferta">
            <label>Cliente</label>
            <input type="text" id="cliente">
            <label>Dirección</label>
            <input type="text" id="direccion">
            <label>Teléfono</label>
            <input type="text" id="telefono">
            <label>Email</label>
            <input type="text" id="email">
            <label>Referencia</label>
            <input type="text" id="referencia">

            <h2 style="margin-top:16px">3. Márgenes</h2>
            <div class="row2">
                <div>
                    <label>Beneficio (%)</label>
                    <input type="number" id="margenGlobal" value="20" min="0" max="100" step="0.1">
                </div>
                <div>
                    <label>Colocación (€)</label>
                    <input type="number" id="colocGlobal" value="50" min="0" step="0.01">
                </div>
            </div>
            <button class="btn btn-primary" onclick="aplicarMargenes()" style="margin-top:10px;width:100%">Aplicar márgenes</button>
        </div>

        <div class="panel right">
            <h2>Partidas del presupuesto</h2>
            <div class="tabla-toolbar hidden" id="tablaToolbar">
                <button class="btn btn-add" onclick="abrirModalPartida()">➕ Añadir partida</button>
                <button class="btn btn-edit" onclick="abrirModalEditar()">✏️ Editar partida</button>
                <button class="btn btn-del" onclick="eliminarPartida()">🗑 Eliminar partida</button>
            </div>
            <div id="tablaWrap">
                <p style="color:#64748b">Carga un archivo TXT para ver las partidas.</p>
            </div>
            <div id="totales" class="totales hidden"></div>
            <div class="botones-pdf">
                <button class="btn btn-success" onclick="generarPdf()" id="btnPdf" disabled>
                    Generar PDF
                </button>
                <button class="btn btn-resumen" onclick="generarResumenPdf()" id="btnResumen" disabled>
                    Resumen Cálculos (PDF interno)
                </button>
            </div>
            <div id="statusPdfGen" class="status"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalPartida">
        <div class="modal">
            <h3>➕ Nueva partida manual</h3>
            <label>Descripción</label>
            <textarea id="nuevaDesc" rows="3" placeholder="Ej: Puerta seccional de garaje..."></textarea>
            <div class="row2" style="margin-top:10px">
                <div>
                    <label>Unidades</label>
                    <input type="number" id="nuevaUds" value="1" min="1" step="1">
                </div>
                <div>
                    <label>Coste base (€)</label>
                    <input type="number" id="nuevaCoste" value="0" min="0" step="0.01">
                </div>
            </div>
            <div class="row2" style="margin-top:8px">
                <div>
                    <label>Margen % (opcional)</label>
                    <input type="number" id="nuevaMargen" placeholder="Usar global" min="0" step="0.1">
                </div>
                <div>
                    <label>Colocación € (opcional)</label>
                    <input type="number" id="nuevaColoc" placeholder="Usar global" min="0" step="0.01">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-success" onclick="guardarPartidaManual()">Guardar partida</button>
                <button class="btn" style="background:#6b7280;color:white" onclick="cerrarModalPartida()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalEditar">
        <div class="modal">
            <h3 id="editarTitulo">✏️ Editar partida</h3>
            <div class="modal-desc" id="editarDescPreview"></div>
            <div class="row2">
                <div>
                    <label>Unidades</label>
                    <input type="number" id="editarUds" min="1" step="1">
                </div>
                <div>
                    <label>Coste base (€)</label>
                    <input type="number" id="editarCoste" min="0" step="0.01">
                </div>
            </div>
            <div class="row2" style="margin-top:8px">
                <div>
                    <label>Margen individual (%)</label>
                    <input type="number" id="editarMargen" min="0" step="0.1">
                </div>
                <div>
                    <label>Colocación individual (€)</label>
                    <input type="number" id="editarColoc" min="0" step="0.01">
                </div>
            </div>
            <label style="margin-top:10px">📝 Nota individual (aparece al final en PDF)</label>
            <textarea id="editarNotaIndividual" rows="2" placeholder="Nota visible en el presupuesto..."></textarea>
            <label>Notas personalizadas</label>
            <textarea id="editarNotas" rows="3" placeholder="Notas internas o para el cliente..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-success" onclick="guardarEdicionPartida()">Guardar cambios</button>
                <button class="btn" style="background:#6b7280;color:white" onclick="cerrarModalEditar()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let items = [];
        let condicionesTexto = "";
        let calculado = false;
        let filaSeleccionada = -1;

        function getMargenGlobal() { return parseFloat(document.getElementById("margenGlobal").value) || 0; }
        function getColocGlobal() { return parseFloat(document.getElementById("colocGlobal").value) || 0; }

        function getMargenItem(item) {
            if (item.margen_individual !== null && item.margen_individual !== undefined) return item.margen_individual;
            if (item.margen_aplicado !== null && item.margen_aplicado !== undefined) return item.margen_aplicado;
            return getMargenGlobal();
        }

        function getColocItem(item) {
            if (item.colocacion_individual !== null && item.colocacion_individual !== undefined) return item.colocacion_individual;
            if (item.colocacion_aplicada !== null && item.colocacion_aplicada !== undefined) return item.colocacion_aplicada;
            return getColocGlobal();
        }

        function recalcularLocal() {
            if (!items.length) return null;
            const filas = [];
            let total_base = 0, coste_total = 0, suma_margenes = 0;
            for (const item of items) {
                const margen = getMargenItem(item);
                const coloc = getColocItem(item);
                item.margen_aplicado = margen;
                item.colocacion_aplicada = coloc;
                const pvp_u = (item.coste_u + coloc) * (1 + margen / 100);
                const subtotal = pvp_u * item.uds;
                total_base += subtotal;
                coste_total += item.coste_u * item.uds;
                suma_margenes += margen;
                filas.push({
                    pos: item.pos, uds: item.uds, desc: item.desc || "",
                    coste_u: item.coste_u, colocacion: coloc, margen,
                    pvp_u: Math.round(pvp_u * 100) / 100,
                    subtotal: Math.round(subtotal * 100) / 100,
                });
            }
            const iva = total_base * 0.21;
            return {
                filas,
                total_base: Math.round(total_base * 100) / 100,
                iva: Math.round(iva * 100) / 100,
                total_final: Math.round((total_base + iva) * 100) / 100,
                coste_total: Math.round(coste_total * 100) / 100,
                beneficio: Math.round((total_base - coste_total) * 100) / 100,
                margen_medio: Math.round((suma_margenes / filas.length) * 10) / 10,
            };
        }

        function escHtml(t) {
            return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        function limpiarDesc(desc) {
            return (desc || "").replace(/<br\/?>/gi, " ").replace(/<[^>]+>/g, "");
        }

        document.getElementById("fileTxt").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append("file", file);
            try {
                const res = await fetch("/api/upload-txt", { method: "POST", body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Error");
                items = data.items;
                calculado = false;
                filaSeleccionada = -1;
                document.getElementById("statusTxt").innerHTML = `<span class="ok">✅ ${file.name} (${data.count} partidas)</span>`;
                document.getElementById("tablaToolbar").classList.remove("hidden");
                renderTabla();
            } catch (err) {
                document.getElementById("statusTxt").innerHTML = `<span class="err">❌ ${err.message}</span>`;
            }
        });

        document.getElementById("filePdf").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file || !items.length) {
                alert("Primero carga el TXT con las partidas.");
                return;
            }
            const fd = new FormData();
            fd.append("file", file);
            fd.append("items_json", JSON.stringify(items));
            try {
                const res = await fetch("/api/upload-pdf", { method: "POST", body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Error");
                items = data.items;
                document.getElementById("statusPdf").innerHTML = `<span class="ok">✅ ${data.dibujos_count} dibujos asociados</span>`;
                if (calculado) renderTotales(recalcularLocal());
                else renderTabla();
            } catch (err) {
                document.getElementById("statusPdf").innerHTML = `<span class="err">❌ ${err.message}</span>`;
            }
        });

        document.getElementById("fileCond").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append("file", file);
            try {
                const res = await fetch("/api/upload-condiciones", { method: "POST", body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Error");
                condicionesTexto = data.texto;
                document.getElementById("statusCond").innerHTML = `<span class="ok">✅ ${file.name}</span>`;
            } catch (err) {
                document.getElementById("statusCond").innerHTML = `<span class="err">❌ ${err.message}</span>`;
            }
        });

        async function aplicarMargenes() {
            if (!items.length) { alert("No hay partidas."); return; }
            const body = {
                items,
                margen_global: parseFloat(document.getElementById("margenGlobal").value) || 0,
                colocacion_global: parseFloat(document.getElementById("colocGlobal").value) || 0,
            };
            const res = await fetch("/api/calcular", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) { alert(data.detail || "Error"); return; }
            items = data.items;
            calculado = true;
            renderTotales(data.totales);
        }

        function cambiarColoc(idx, val) {
            items[idx].colocacion_individual = parseFloat(val) || 0;
            if (calculado) renderTotales(recalcularLocal());
        }

        function cambiarMargen(idx, val) {
            items[idx].margen_individual = parseFloat(val) || 0;
            if (calculado) renderTotales(recalcularLocal());
        }

        function cambiarUds(idx, val) {
            const uds = parseInt(val, 10);
            if (!uds || uds <= 0) { alert("Unidades inválidas."); return; }
            items[idx].uds = uds;
            if (calculado) renderTotales(recalcularLocal());
        }

        function cambiarCoste(idx, val) {
            const coste = parseFloat(val);
            if (isNaN(coste) || coste < 0) { alert("Coste inválido."); return; }
            items[idx].coste_u = coste;
            if (calculado) renderTotales(recalcularLocal());
        }

        function tieneNotas(item) {
            return (item.notas && item.notas.trim()) || (item.nota_individual && item.nota_individual.trim());
        }

        function abrirModalEditar(idx) {
            const i = idx !== undefined ? idx : filaSeleccionada;
            if (i < 0 || i >= items.length) {
                alert("Selecciona una partida haciendo clic en su fila.");
                return;
            }
            filaSeleccionada = i;
            const item = items[i];
            document.getElementById("editarTitulo").textContent = `✏️ Editar ${item.pos}`;
            document.getElementById("editarDescPreview").textContent = limpiarDesc(item.desc);
            document.getElementById("editarUds").value = item.uds;
            document.getElementById("editarCoste").value = item.coste_u.toFixed(2);
            document.getElementById("editarMargen").value = getMargenItem(item).toFixed(1);
            document.getElementById("editarColoc").value = getColocItem(item).toFixed(2);
            document.getElementById("editarNotaIndividual").value = item.nota_individual || "";
            document.getElementById("editarNotas").value = item.notas || "";
            document.getElementById("modalEditar").classList.add("active");
        }

        function cerrarModalEditar() {
            document.getElementById("modalEditar").classList.remove("active");
        }

        function guardarEdicionPartida() {
            if (filaSeleccionada < 0) return;
            const item = items[filaSeleccionada];
            const uds = parseInt(document.getElementById("editarUds").value, 10);
            const coste = parseFloat(document.getElementById("editarCoste").value);
            if (!uds || uds <= 0) { alert("Unidades inválidas."); return; }
            if (isNaN(coste) || coste < 0) { alert("Coste inválido."); return; }
            item.uds = uds;
            item.coste_u = coste;
            item.margen_individual = parseFloat(document.getElementById("editarMargen").value) || 0;
            item.colocacion_individual = parseFloat(document.getElementById("editarColoc").value) || 0;
            item.nota_individual = document.getElementById("editarNotaIndividual").value.trim();
            item.notas = document.getElementById("editarNotas").value.trim();
            cerrarModalEditar();
            if (calculado) renderTotales(recalcularLocal());
            else renderTabla();
        }

        function seleccionarFila(idx) {
            filaSeleccionada = idx;
            document.querySelectorAll(".tabla-row").forEach((r, i) => {
                r.classList.toggle("selected", i === idx);
            });
        }

        function abrirModalPartida() {
            if (!items.length) { alert("Primero carga un TXT."); return; }
            document.getElementById("nuevaDesc").value = "";
            document.getElementById("nuevaUds").value = "1";
            document.getElementById("nuevaCoste").value = "0";
            document.getElementById("nuevaMargen").value = "";
            document.getElementById("nuevaColoc").value = "";
            document.getElementById("modalPartida").classList.add("active");
        }

        function cerrarModalPartida() {
            document.getElementById("modalPartida").classList.remove("active");
        }

        function guardarPartidaManual() {
            const descripcion = document.getElementById("nuevaDesc").value.trim();
            if (!descripcion) { alert("La descripción no puede estar vacía."); return; }
            const uds = parseInt(document.getElementById("nuevaUds").value, 10);
            if (!uds || uds <= 0) { alert("Unidades inválidas."); return; }
            const coste = parseFloat(document.getElementById("nuevaCoste").value);
            if (isNaN(coste) || coste < 0) { alert("Coste inválido."); return; }
            const margenTxt = document.getElementById("nuevaMargen").value.trim();
            const colocTxt = document.getElementById("nuevaColoc").value.trim();
            let margen_individual = null, colocacion_individual = null;
            if (margenTxt !== "") margen_individual = parseFloat(margenTxt) || 0;
            if (colocTxt !== "") colocacion_individual = parseFloat(colocTxt) || 0;

            const nuevaPos = `Pos.${items.length + 1}`;
            items.push({
                pos: nuevaPos,
                desc: descripcion,
                coste_u: coste,
                uds,
                margen_individual,
                colocacion_individual,
                notas: "(Partida manual)",
                dibujo_base64: null,
            });
            cerrarModalPartida();
            if (calculado) {
                renderTotales(recalcularLocal());
            } else {
                renderTabla();
            }
        }

        function eliminarPartida() {
            if (filaSeleccionada < 0 || filaSeleccionada >= items.length) {
                alert("Selecciona una partida haciendo clic en su fila.");
                return;
            }
            const item = items[filaSeleccionada];
            const desc = limpiarDesc(item.desc).slice(0, 50);
            if (!confirm(`¿Eliminar ${item.pos}?\n\n${desc}`)) return;
            items.splice(filaSeleccionada, 1);
            filaSeleccionada = -1;
            if (!items.length) {
                calculado = false;
                document.getElementById("tablaToolbar").classList.add("hidden");
                document.getElementById("tablaWrap").innerHTML = '<p style="color:#64748b">Carga un archivo TXT para ver las partidas.</p>';
                document.getElementById("totales").classList.add("hidden");
                document.getElementById("btnPdf").disabled = true;
                document.getElementById("btnResumen").disabled = true;
                return;
            }
            if (calculado) renderTotales(recalcularLocal());
            else renderTabla();
        }

        function fmtEuro(v) { return v.toFixed(2).replace(".", ",") + " €"; }

        function renderTotales(t) {
            const el = document.getElementById("totales");
            el.classList.remove("hidden");
            el.innerHTML = `
                <div class="totales-row">
                    <div class="totales-item"><strong>Total Base:</strong> <span>${fmtEuro(t.total_base)}</span></div>
                    <span class="totales-sep">│</span>
                    <div class="totales-item"><strong>IVA (21%):</strong> <span>${fmtEuro(t.iva)}</span></div>
                    <span class="totales-sep">│</span>
                    <div class="totales-item final"><strong>TOTAL FINAL:</strong> <span>${fmtEuro(t.total_final)}</span></div>
                </div>
                <div class="totales-row">
                    <div class="totales-item secondary"><strong>Coste Total:</strong> <span>${fmtEuro(t.coste_total)}</span></div>
                    <span class="totales-sep">│</span>
                    <div class="totales-item beneficio"><strong>Beneficio:</strong> <span>${fmtEuro(t.beneficio)}</span></div>
                    <span class="totales-sep">│</span>
                    <div class="totales-item margen"><strong>Margen Medio:</strong> <span>${t.margen_medio.toFixed(1)}%</span></div>
                </div>
            `;
            document.getElementById("btnPdf").disabled = false;
            document.getElementById("btnResumen").disabled = false;
            renderTablaFilas(t.filas, true);
        }

        function renderTablaFilas(filas, editable) {
            if (!filas) return;
            let html = `<table><thead><tr>
                <th>Pos</th><th>Uds</th><th>Descripción</th>
                <th>Coste</th><th>Coloc.</th><th>%</th><th>PVP</th><th>Total</th>
            </tr></thead><tbody>`;
            for (let i = 0; i < filas.length; i++) {
                const f = filas[i];
                const desc = limpiarDesc(f.desc);
                const corta = desc.length > 40 ? desc.slice(0, 40) + "..." : desc;
                const sel = i === filaSeleccionada ? " selected" : "";
                const colocCell = editable
                    ? `<input class="inp-celda" type="number" min="0" step="0.01" value="${getColocItem(items[i]).toFixed(2)}" onchange="cambiarColoc(${i}, this.value)" onclick="event.stopPropagation()">`
                    : `${f.colocacion.toFixed(2)}`;
                const margenCell = editable
                    ? `<input class="inp-celda" type="number" min="0" step="0.1" value="${getMargenItem(items[i]).toFixed(1)}" onchange="cambiarMargen(${i}, this.value)" onclick="event.stopPropagation()">`
                    : `${f.margen.toFixed(1)}%`;
                const udsCell = editable
                    ? `<input class="inp-celda inp-celda-sm" type="number" min="1" step="1" value="${items[i].uds}" onchange="cambiarUds(${i}, this.value)" onclick="event.stopPropagation()">`
                    : `${f.uds}`;
                const costeCell = editable
                    ? `<input class="inp-celda" type="number" min="0" step="0.01" value="${items[i].coste_u.toFixed(2)}" onchange="cambiarCoste(${i}, this.value)" onclick="event.stopPropagation()">`
                    : `${f.coste_u.toFixed(2)}`;
                const notaIcon = tieneNotas(items[i]) ? '<span class="nota-icon" title="Tiene notas">📝</span>' : '';
                html += `<tr class="tabla-row${sel}" onclick="seleccionarFila(${i})" ondblclick="abrirModalEditar(${i})">
                    <td>${escHtml(f.pos)}</td><td>${udsCell}</td><td>${escHtml(corta)}${notaIcon}</td>
                    <td>${costeCell}</td><td>${colocCell}</td>
                    <td>${margenCell}</td><td>${f.pvp_u.toFixed(2)}</td>
                    <td>${f.subtotal.toFixed(2)} €</td>
                </tr>`;
            }
            html += "</tbody></table>";
            document.getElementById("tablaWrap").innerHTML = html;
        }

        function renderTabla() {
            if (!items.length) return;
            let html = `<table><thead><tr><th>Pos</th><th>Uds</th><th>Descripción</th><th>Coste u.</th></tr></thead><tbody>`;
            for (let i = 0; i < items.length; i++) {
                const it = items[i];
                const desc = limpiarDesc(it.desc);
                const corta = desc.length > 50 ? desc.slice(0, 50) + "..." : desc;
                const sel = i === filaSeleccionada ? " selected" : "";
                const notaIcon = tieneNotas(it) ? '<span class="nota-icon" title="Tiene notas">📝</span>' : '';
                html += `<tr class="tabla-row${sel}" onclick="seleccionarFila(${i})" ondblclick="abrirModalEditar(${i})">
                    <td>${escHtml(it.pos)}</td><td>${it.uds}</td><td>${escHtml(corta)}${notaIcon}</td><td>${it.coste_u.toFixed(2)} €</td></tr>`;
            }
            html += "</tbody></table>";
            document.getElementById("tablaWrap").innerHTML = html;
            if (!calculado) {
                document.getElementById("btnPdf").disabled = true;
                document.getElementById("btnResumen").disabled = true;
                document.getElementById("totales").classList.add("hidden");
            }
        }

        async function generarPdf() {
            if (!items.length) { alert("No hay partidas."); return; }
            const body = {
                items,
                datos_cliente: {
                    num_oferta: document.getElementById("numOferta").value,
                    cliente: document.getElementById("cliente").value,
                    direccion: document.getElementById("direccion").value,
                    telefono: document.getElementById("telefono").value,
                    email: document.getElementById("email").value,
                    referencia: document.getElementById("referencia").value,
                },
                condiciones_texto: condicionesTexto,
            };
            document.getElementById("statusPdfGen").textContent = "Generando PDF...";
            try {
                const res = await fetch("/api/generar-pdf", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Error al generar PDF");
                }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `Presupuesto_${document.getElementById("numOferta").value || "web"}.pdf`;
                a.click();
                URL.revokeObjectURL(url);
                document.getElementById("statusPdfGen").innerHTML = `<span class="ok">✅ PDF descargado</span>`;
            } catch (err) {
                document.getElementById("statusPdfGen").innerHTML = `<span class="err">❌ ${err.message}</span>`;
            }
        }
        async function generarResumenPdf() {
            if (!items.length) { alert("No hay partidas."); return; }
            const body = {
                items,
                datos_cliente: {
                    num_oferta: document.getElementById("numOferta").value,
                    cliente: document.getElementById("cliente").value,
                },
            };
            document.getElementById("statusPdfGen").textContent = "Generando resumen interno...";
            try {
                const res = await fetch("/api/generar-resumen-pdf", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Error al generar resumen");
                }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                const num = document.getElementById("numOferta").value || "resumen";
                a.download = `Resumen_Calculos_${num}.pdf`;
                a.click();
                URL.revokeObjectURL(url);
                document.getElementById("statusPdfGen").innerHTML = `<span class="ok">✅ Resumen interno descargado</span>`;
            } catch (err) {
                document.getElementById("statusPdfGen").innerHTML = `<span class="err">❌ ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
