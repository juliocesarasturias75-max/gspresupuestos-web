<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin usuarios - GSpresupuestos</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; }
        header { background: #1e40af; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        header a { color: #bfdbfe; text-decoration: none; font-size: 0.85rem; margin-left: 14px; }
        .wrap { max-width: 900px; margin: 20px auto; padding: 0 16px; }
        .panel { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        h2 { color: #1e40af; font-size: 1rem; margin: 0 0 14px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin: 8px 0 4px; }
        input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.85rem; }
        .row2 { display: flex; gap: 12px; }
        .row2 > div { flex: 1; }
        .btn { padding: 8px 14px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; font-size: 0.82rem; }
        .btn-primary { background: #1e40af; color: white; }
        .btn-del { background: #ef4444; color: white; }
        .btn-warn { background: #f59e0b; color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #1e40af; color: white; padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #e2e8f0; }
        .badge { background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; }
        .badge-off { background: #fee2e2; color: #b91c1c; }
        select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.85rem; }
        .ficha-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .ficha-row input[type=text] { flex: 1; min-width: 160px; }
        .ficha-row select { width: auto; min-width: 140px; }
        .status { font-size: 0.8rem; margin-top: 8px; }
        .ok { color: #10b981; }
        .err { color: #dc2626; }
    </style>
</head>
<body>
    <header>
        <strong>👤 Administración de usuarios</strong>
        <div>
            <a href="/">← Volver a la app</a>
            <a href="#" onclick="cerrarSesion(); return false;">Salir</a>
        </div>
    </header>

    <div class="wrap">
        <div class="panel">
            <h2>Crear nuevo usuario</h2>
            <div class="row2">
                <div>
                    <label>Email (será su usuario de acceso)</label>
                    <input type="email" id="nuevoEmail" placeholder="distribuidor@empresa.com">
                </div>
                <div>
                    <label>Nombre / Empresa</label>
                    <input type="text" id="nuevoNombre" placeholder="Distribuidor Norte">
                </div>
            </div>
            <label>Contraseña inicial</label>
            <input type="text" id="nuevoPassword" placeholder="Mínimo 6 caracteres">
            <div style="margin-top:12px">
                <button class="btn btn-primary" onclick="crearUsuario()">➕ Crear usuario</button>
            </div>
            <div id="statusCrear" class="status"></div>
        </div>

        <div class="panel">
            <h2>Usuarios registrados</h2>
            <div id="tablaUsuarios">Cargando...</div>
        </div>

        <div class="panel">
            <h2>📎 Fichas técnicas PDF</h2>
            <p style="font-size:0.82rem;color:#64748b;margin:0 0 12px">
                Sube PDFs de series, vidrios, cajones, garantías, etc. Los usuarios podrán elegir cuáles incluir al generar el presupuesto.
            </p>
            <div class="row2">
                <div>
                    <label>Nombre de la ficha</label>
                    <input type="text" id="fichaNombre" placeholder="Ej. Serie Corredera 70">
                </div>
                <div>
                    <label>Categoría</label>
                    <select id="fichaCategoria">
                        <option value="series">Series de ventana</option>
                        <option value="vidrios">Vidrios</option>
                        <option value="cajones">Cajones</option>
                        <option value="garantias">Garantías</option>
                        <option value="otros">Otros</option>
                    </select>
                </div>
            </div>
            <label>Archivo PDF</label>
            <input type="file" id="fichaArchivo" accept=".pdf,application/pdf">
            <div style="margin-top:12px">
                <button class="btn btn-primary" onclick="subirFicha()">➕ Subir ficha</button>
            </div>
            <div id="statusFicha" class="status"></div>
            <div id="tablaFichas" style="margin-top:16px">Cargando fichas...</div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        (async () => {
            if (!(await requiereAuth())) return;
            const me = await cargarUsuarioActual();
            if (!me?.is_admin) {
                alert("Solo administradores pueden acceder.");
                window.location.href = "/";
                return;
            }
            cargarUsuarios();
            cargarFichasAdmin();
        })();

        async function cargarUsuarios() {
            const wrap = document.getElementById("tablaUsuarios");
            try {
                const res = await apiFetch("/api/admin/usuarios");
                if (!res.ok) throw new Error("Error al cargar usuarios");
                const data = await res.json();
                const lista = data.usuarios || [];
                if (!lista.length) {
                    wrap.innerHTML = "<p>No hay usuarios.</p>";
                    return;
                }
                wrap.innerHTML = `<table>
                    <thead><tr><th>Email</th><th>Nombre</th><th>Rol</th><th>Acciones</th></tr></thead>
                    <tbody>${lista.map(u => `<tr>
                        <td>${esc(u.email)}</td>
                        <td>${esc(u.nombre || "—")}</td>
                        <td>${u.is_admin ? '<span class="badge">Admin</span>' : "Usuario"}</td>
                        <td>
                            <button class="btn btn-warn" onclick="resetPass('${u.id}', '${esc(u.email)}')">Reset pass</button>
                            ${u.is_admin ? "" : `<button class="btn btn-del" onclick="borrarUsuario('${u.id}', '${esc(u.email)}')">Eliminar</button>`}
                        </td>
                    </tr>`).join("")}</tbody></table>`;
            } catch (e) {
                wrap.innerHTML = `<p class="err">${e.message}</p>`;
            }
        }

        function esc(t) {
            return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        async function crearUsuario() {
            const st = document.getElementById("statusCrear");
            const body = {
                email: document.getElementById("nuevoEmail").value.trim(),
                nombre: document.getElementById("nuevoNombre").value.trim(),
                password: document.getElementById("nuevoPassword").value,
            };
            try {
                const res = await apiFetch("/api/admin/usuarios", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Error");
                st.innerHTML = `<span class="ok">✅ Usuario creado: ${esc(data.email)}</span>`;
                document.getElementById("nuevoEmail").value = "";
                document.getElementById("nuevoNombre").value = "";
                document.getElementById("nuevoPassword").value = "";
                cargarUsuarios();
            } catch (e) {
                st.innerHTML = `<span class="err">❌ ${e.message}</span>`;
            }
        }

        async function resetPass(userId, email) {
            const pass = prompt(`Nueva contraseña para ${email}:`);
            if (!pass) return;
            const res = await apiFetch(`/api/admin/usuarios/${userId}/password`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: pass }),
            });
            if (res.ok) alert("Contraseña actualizada.");
            else alert((await res.json()).detail || "Error");
        }

        async function borrarUsuario(userId, email) {
            if (!confirm(`¿Eliminar usuario ${email}?`)) return;
            const res = await apiFetch(`/api/admin/usuarios/${userId}`, { method: "DELETE" });
            if (res.ok) cargarUsuarios();
            else alert((await res.json()).detail || "Error");
        }

        let categoriasFichas = {};

        async function cargarFichasAdmin() {
            const wrap = document.getElementById("tablaFichas");
            try {
                const res = await apiFetch("/api/admin/fichas");
                if (!res.ok) throw new Error("Error al cargar fichas");
                const data = await res.json();
                categoriasFichas = data.categorias || {};
                const lista = data.fichas || [];
                if (!lista.length) {
                    wrap.innerHTML = "<p>No hay fichas subidas.</p>";
                    return;
                }
                wrap.innerHTML = `<table>
                    <thead><tr><th>Nombre</th><th>Categoría</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody>${lista.map(f => `<tr>
                        <td><input type="text" value="${esc(f.nombre)}" id="nom_${f.id}" style="width:100%"></td>
                        <td>
                            <select id="cat_${f.id}">
                                ${Object.entries(categoriasFichas).map(([k, v]) =>
                                    `<option value="${k}"${k === f.categoria ? " selected" : ""}>${esc(v)}</option>`
                                ).join("")}
                            </select>
                        </td>
                        <td>${f.activa
                            ? '<span class="badge">Activa</span>'
                            : '<span class="badge badge-off">Inactiva</span>'}</td>
                        <td style="white-space:nowrap">
                            <button class="btn btn-warn" onclick="guardarFicha('${f.id}')">Guardar</button>
                            <button class="btn btn-primary" onclick="toggleFicha('${f.id}', ${!f.activa})">${f.activa ? "Desactivar" : "Activar"}</button>
                            <button class="btn btn-del" onclick="borrarFicha('${f.id}', '${esc(f.nombre)}')">Eliminar</button>
                        </td>
                    </tr>`).join("")}</tbody></table>`;
            } catch (e) {
                wrap.innerHTML = `<p class="err">${e.message}</p>`;
            }
        }

        async function subirFicha() {
            const st = document.getElementById("statusFicha");
            const nombre = document.getElementById("fichaNombre").value.trim();
            const categoria = document.getElementById("fichaCategoria").value;
            const fileInput = document.getElementById("fichaArchivo");
            const file = fileInput.files[0];
            if (!nombre) { st.innerHTML = '<span class="err">Indica un nombre.</span>'; return; }
            if (!file) { st.innerHTML = '<span class="err">Selecciona un PDF.</span>'; return; }
            const fd = new FormData();
            fd.append("file", file);
            fd.append("nombre", nombre);
            fd.append("categoria", categoria);
            fd.append("activa", "true");
            try {
                const res = await apiFetch("/api/admin/fichas", { method: "POST", body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Error al subir");
                st.innerHTML = `<span class="ok">✅ Ficha subida: ${esc(data.nombre)}</span>`;
                document.getElementById("fichaNombre").value = "";
                fileInput.value = "";
                cargarFichasAdmin();
            } catch (e) {
                st.innerHTML = `<span class="err">❌ ${e.message}</span>`;
            }
        }

        async function guardarFicha(fichaId) {
            const nombre = document.getElementById(`nom_${fichaId}`).value.trim();
            const categoria = document.getElementById(`cat_${fichaId}`).value;
            const res = await apiFetch(`/api/admin/fichas/${fichaId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre, categoria }),
            });
            if (res.ok) cargarFichasAdmin();
            else alert((await res.json()).detail || "Error");
        }

        async function toggleFicha(fichaId, activa) {
            const res = await apiFetch(`/api/admin/fichas/${fichaId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ activa }),
            });
            if (res.ok) cargarFichasAdmin();
            else alert((await res.json()).detail || "Error");
        }

        async function borrarFicha(fichaId, nombre) {
            if (!confirm(`¿Eliminar ficha "${nombre}"?`)) return;
            const res = await apiFetch(`/api/admin/fichas/${fichaId}`, { method: "DELETE" });
            if (res.ok) cargarFichasAdmin();
            else alert((await res.json()).detail || "Error");
        }
    </script>
</body>
</html>
