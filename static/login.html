<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - GSpresupuestos</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: rgb(59, 129, 54);
            min-height: 100vh; margin: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: white; border-radius: 12px; padding: 36px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .login-logo {
            display: block;
            max-width: 240px;
            width: 100%;
            height: auto;
            margin: 0 auto 18px;
        }
        h1 { color: rgb(59, 129, 54); font-size: 1.4rem; margin: 0 0 6px; text-align: center; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 24px; text-align: center; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin: 12px 0 4px; }
        input {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1;
            border-radius: 6px; font-size: 0.9rem;
        }
        .btn {
            width: 100%; margin-top: 20px; padding: 12px;
            background: rgb(59, 129, 54); color: white; border: none;
            border-radius: 6px; font-weight: 700; font-size: 0.95rem; cursor: pointer;
        }
        .btn:hover { background: rgb(45, 110, 42); }
        .err { color: #dc2626; font-size: 0.82rem; margin-top: 12px; min-height: 20px; }
        .info { color: #64748b; font-size: 0.78rem; margin-top: 16px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/static/LOGOSECO-C.jpg" alt="SECO PVC - Fábrica de Ventanas" class="login-logo">
        <h1>GSpresupuestos</h1>
        <p class="sub">Generador de presupuestos · Versión 2.0</p>
        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" required autocomplete="username" placeholder="tu@empresa.com">
            <label>Contraseña</label>
            <input type="password" id="password" required autocomplete="current-password">
            <button type="submit" class="btn">Entrar</button>
        </form>
        <div id="error" class="err"></div>
        <p class="info">¿No tienes cuenta? Pide acceso al administrador.</p>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        (async () => {
            const session = getSession();
            if (session?.access_token) {
                window.location.href = "/";
            }
        })();

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errEl = document.getElementById("error");
            errEl.textContent = "";
            try {
                await iniciarSesion(
                    document.getElementById("email").value.trim(),
                    document.getElementById("password").value
                );
                window.location.href = "/";
            } catch (err) {
                errEl.textContent = err.message || "Error al iniciar sesión.";
            }
        });
    </script>
</body>
</html>
